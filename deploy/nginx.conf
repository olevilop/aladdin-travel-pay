# Конфиг Nginx: реверс-прокси на Node-сервер (127.0.0.1:3000).
# Плейсхолдер __DOMAIN__ автоматически заменяется в deploy/setup-server.sh.
# После запуска certbot этот файл будет дополнен блоком с HTTPS (listen 443 + SSL).

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # Лимит размера загружаемого файла (счета/инвойсы).
    client_max_body_size 25m;

    # REST API (Express + PostgreSQL) на порту 3001.
    # Префикс /api срезается: /api/auth/login -> backend /auth/login.
    location /api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Статика собранного клиента отдаётся самим Node-сервером,
    # но кэш-заголовки для /assets можно усилить тут.
    location /assets/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
